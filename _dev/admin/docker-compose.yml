# Deploys the tinkoder-site admin GUI. Meant to run ON the machine that
# also holds the site's git working tree (see Dockerfile's note on why —
# SITE_ROOT is derived from the app's own file location, so the whole
# repo has to be mounted, not just this directory).
#
# Run from this directory: `docker compose up -d`.
# Requires a `.env` file here (copy `.env.example`) with at least
# ADMIN_TOKEN set, and APP_UID set to the numeric owner of this repo's
# working tree on this host (`stat -c %u .` from the repo root) — the
# container user must match it to have write/commit access to /site.
services:
  admin:
    build:
      context: .
      args:
        APP_UID: ${APP_UID:-1000}
    restart: unless-stopped
    ports:
      - "8088:8000"
    volumes:
      # Whole site repo, read-write — Save/Publish/Upload/Revert all edit
      # and commit against this real working tree.
      - ../..:/site
      # GitHub deploy key (write access to this repo only), generated on
      # the host — never baked into the image. Read-only mount; see
      # Dockerfile for the known_hosts/ssh config that references this
      # exact path. Must not exist inside this repo's own working tree
      # (it isn't — see the sibling deploy-key/ next to tinkoder-site/).
      - ../../../tinkoder-site-deploy-key/id_ed25519_deploy:/home/appuser/.ssh/deploy_key:ro
    env_file:
      - .env
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 5s
